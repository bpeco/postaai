name: digest

# Etapa 5 — auto-publicación del Pool al CDN, 2x/día, sin tocar la Mac.
# Corre el pipeline en modo --pool-only (fases 1-3 + 7): fetch → extract → rank → Pool.
# El digest/ideas/reels (workflow de creador) NO corre acá — va a mano en la compu.
# El Pool generado se pushea a bpeco/postaai-content; Vercel lo redeploya al CDN.

on:
  schedule:
    # 12:00 y 21:00 UTC = 09:00 y 18:00 ART (Argentina es UTC-3 fijo, sin DST).
    - cron: "0 12,21 * * *"
  workflow_dispatch: {} # disparo manual desde la UI de Actions (para validar)

# El GITHUB_TOKEN del job solo necesita leer este repo (el código). El push al repo de
# contenido (postaai-content) va con un token de GitHub App, no con este.
permissions:
  contents: read

concurrency:
  # Si una corrida se solapa con otra (re-run manual mientras corre el cron), cancelamos
  # la vieja para no pushear dos Pools pisados al CDN.
  group: digest
  cancel-in-progress: false

jobs:
  publish-pool:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      # Todo el pipeline corre en hora argentina: así STAMP, slot, edición y fecha se
      # computan igual que en la Mac, sin tocar la lógica de los scripts.
      TZ: America/Argentina/Buenos_Aires

    steps:
      - name: Checkout código (postaai)
        uses: actions/checkout@v4

      - name: Mint token de GitHub App (write solo a postaai-content)
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.CONTENT_APP_CLIENT_ID }}
          private-key: ${{ secrets.CONTENT_APP_PRIVATE_KEY }}
          owner: bpeco
          repositories: postaai-content
          permission-contents: write # token scopeado a solo escribir contenido

      - name: Checkout contenido (postaai-content)
        uses: actions/checkout@v4
        with:
          repository: bpeco/postaai-content
          token: ${{ steps.app-token.outputs.token }}
          path: postaai-content
          # Persistimos las credenciales del App en este checkout para que el
          # `git push` de publish-pool.sh las use al pushear el Pool.
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar Claude Code CLI
        # Versión PINEADA (no 'latest'): el runner instalaba la última en cada corrida, lo que
        # vuelve el cron no-reproducible y deja que un bump del CLI rompa el headless sin aviso
        # (sospechoso del cuelgue que arrancó ~16/06). 2.1.177 = la conocida-buena (la que corre
        # local). Para subir de versión: cambiar acá a propósito y verificar un run manual.
        run: npm install -g @anthropic-ai/claude-code@2.1.177

      - name: Configurar identidad git (para el commit a postaai-content)
        # Identidad válida cualquiera (git la exige para commitear). El deploy a Vercel NO
        # depende de este autor: lo dispara el Deploy Hook (Vercel Hobby + repo privado
        # bloquea el auto-deploy por-autor del Git integration).
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Correr pipeline (--pool-only) y publicar al CDN
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # publish-pool.sh pushea al checkout de postaai-content del workspace.
          CONTENT_REPO: ${{ github.workspace }}/postaai-content
        run: ./ai-digest/scripts/run-digest.sh --pool-only

      - name: Disparar deploy en Vercel (Deploy Hook)
        # El hook deploya el último commit de postaai-content sin mirar el autor → evita
        # el bloqueo de Hobby. Si el secret no está cargado todavía, no rompe el run.
        env:
          HOOK: ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$HOOK" ]; then
            echo "VERCEL_DEPLOY_HOOK_URL no seteado — skip deploy hook" >&2
            exit 0
          fi
          curl -fsS -X POST "$HOOK" > /dev/null && echo "Deploy hook disparado OK"
